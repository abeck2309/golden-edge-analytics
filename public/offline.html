<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#b4975a" />
    <title>Golden Edge Analytics Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at top, rgba(180, 151, 90, 0.2), transparent 34rem),
          #070707;
        color: #f8f3e7;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        margin: 0 auto;
        max-width: 420px;
      }

      p:first-child {
        color: #b4975a;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        margin: 0 0 12px;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(32px, 12vw, 52px);
        line-height: 0.95;
        margin: 0;
      }

      p {
        color: #c9c3b5;
        font-size: 16px;
        line-height: 1.65;
        margin: 18px 0 0;
      }

      a {
        background: #b4975a;
        border-radius: 999px;
        color: #090909;
        display: inline-block;
        font-size: 14px;
        font-weight: 900;
        margin-top: 24px;
        padding: 12px 18px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Golden Edge Analytics</p>
      <h1>You are offline</h1>
      <p>
        The app shell is installed, but live VGK data and articles need a connection. Reconnect and
        try again.
      </p>
      <a href="/">Reload Golden Edge</a>
    </main>
  </body>
</html>
